name: Build and Deploy MG Duel (Production)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download environment from Envly
        env:
          ENVLY_API_URL: "https://envly.xyz/api/env/mgduel"
          ENVLY_TOKEN: ${{ secrets.ENVLY_TOKEN }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${ENVLY_TOKEN}" \
            "${ENVLY_API_URL}" > .env

      - name: Build Docker image
        shell: bash
        run: |
          set -a
          source .env
          set +a

          docker build \
            --build-arg VITE_APP_NAME \
            --build-arg VITE_REVERB_APP_KEY \
            --build-arg VITE_REVERB_HOST \
            --build-arg VITE_REVERB_PORT \
            --build-arg VITE_REVERB_SCHEME \
            -t mgduel:${{ github.sha }} .

      - name: Save Docker image
        run: docker save mgduel:${{ github.sha }} | gzip > mgduel-production.tar.gz

      - name: Create tag file
        run: echo "${{ github.sha }}" > TAG

      - name: Deploy artifacts to /tmp
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "mgduel-production.tar.gz,TAG,.env,./docker-compose.production.yml"
          target: "/tmp/mgduel-production"

      - name: Prepare server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            docker image prune -a -f --filter "until=24h" || true

      - name: Deploy and restart services
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e

            TARGET="mgduel"
            mkdir -p /opt/apps/$TARGET
            cp -f /tmp/mgduel-production/TAG /opt/apps/$TARGET/TAG
            cp -f /tmp/mgduel-production/.env /opt/apps/$TARGET/.env
            cp -f /tmp/mgduel-production/docker-compose.production.yml /opt/apps/$TARGET/docker-compose.production.yml
            cp -f /tmp/mgduel-production/mgduel-production.tar.gz /opt/apps/$TARGET/mgduel-production.tar.gz

            cd /opt/apps/$TARGET
            export TAG=$(cat TAG)
            echo "Deploying version $TAG to $TARGET"

            docker load < mgduel-production.tar.gz

            docker compose -f docker-compose.production.yml up -d --wait --wait-timeout 180 mysql redis
            docker compose -f docker-compose.production.yml run --rm app php artisan migrate --force --no-interaction
            docker compose -f docker-compose.production.yml run --rm app php artisan optimize:clear --no-interaction
            docker compose -f docker-compose.production.yml run --rm app php artisan horizon:terminate || true
            docker compose -f docker-compose.production.yml up -d --no-deps --force-recreate app reverb worker scheduler phpmyadmin
