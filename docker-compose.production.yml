services:
  app:
    image: mgduel:${TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VIRTUAL_HOST: ${VIRTUAL_HOST}
      VIRTUAL_PORT: 80
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - internal
      - nginx-proxy

  reverb:
    image: mgduel:${TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${REVERB_PUBLIC_PORT:-8080}:8080"
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - internal

  worker:
    image: mgduel:${TAG:-latest}
    restart: unless-stopped
    stop_grace_period: 5m
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      reverb:
        condition: service_started
    command: php artisan horizon
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - internal

  scheduler:
    image: mgduel:${TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -lc 'while true; do php artisan schedule:run --no-interaction; sleep 60; done'
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - internal

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - --binlog-expire-logs-seconds=86400
      - --max-binlog-size=100M
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 1024M
    ports:
      - "${PHPMYADMIN_PORT:-38082}:80"
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    stop_grace_period: 1m
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  internal:
  nginx-proxy:
    external: true
    name: nginx-proxy

volumes:
  mysql_data:
  app_storage:
